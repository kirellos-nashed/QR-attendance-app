<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
        }

        p {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            text-align: right;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-sizing: border-box;
            text-align: right;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        #result-area {
            margin-top: 30px;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-top: 2px dashed var(--border);
        }

        #qrcode {
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .warning-box {
            background-color: #fef3c7;
            color: #b45309;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Meeting Attendance</h1>
        <p>قم بإنشاء رمز (QR Code) الخاص بك لتسجيل الحضور.</p>

        <form id="qr-form">
            <div class="input-group">
                <label for="name">اسمك الرباعي (بالعربية فقط)</label>
                <input type="text" id="name" pattern="^[\u0600-\u06FF\s]+$" title="الرجاء إدخال الاسم باللغة العربية"
                    required>
            </div>

            <div class="input-group">
                <label for="group">دفعتك (3 أرقام)</label>
                <input type="number" id="group" placeholder="مثال: 197" min="170" max="230" required>
            </div>

            <button type="submit" class="btn">إنشاء الرمز</button>
        </form>

        <div id="result-area">
            <div class="warning-box">
                📸 يرجى التقاط صورة للشاشة (Screenshot) والاحتفاظ بها لاستخدامها كل أسبوع!
            </div>
            <div id="qrcode"></div>
            <h2 id="display-name" style="margin-bottom: 5px;"></h2>
            <p id="display-group" style="margin-top: 0; font-weight: bold; color: var(--primary);"></p>
        </div>
    </div>

    <script>
        document.getElementById('qr-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const group = document.getElementById('group').value;

            // Arabic validation fallback
            const arabicRegex = /^[\u0600-\u06FF\s]+$/;
            if (!arabicRegex.test(name)) {
                alert("الرجاء إدخال الاسم باللغة العربية فقط.");
                return;
            }

            // Create the exact format expected by our scanner app
            const groupId = parseInt(group, 10);
            const qrString = `${name}|${group}`;
            const safeQrString = encodeURIComponent(qrString); // UTF-8 Encoding

            // Clear previous QR
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';

            // Generate new QR
            new QRCode(qrContainer, {
                text: safeQrString,
                width: 200,
                height: 200,
                colorDark: "#0f172a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.L
            });

            // Update UI text
            document.getElementById('display-name').textContent = name;
            document.getElementById('display-group').textContent = `مجموعة: ${group}`;

            // Show result area and hide form button
            document.getElementById('result-area').style.display = 'flex';
            document.querySelector('.btn').style.display = 'none';
        });
    </script>
</body>

</html>
